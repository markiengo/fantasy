services:
  - type: web
    name: wc-fantasy-2026
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - app/**
        - frontend/**
        - requirements.txt
        - render.yaml
      ignoredPaths:
        - docs/**
        - personal/**
        - tests/**
        - tools/**
        - .agents/**
        - .claude/**
        - .codex/**
        - mcp_excalidraw/**
        - README.md
        - AGENTS.md
        - CLAUDE.md
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: ""
    plan: free
